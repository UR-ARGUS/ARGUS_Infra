name: App CI (PR Lint & Test)

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      # frontend/package.json에 test 스크립트가 아직 없어 테스트 도입 전까지는 lint만 수행

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        # requirements.txt에 pytest가 없어 임시로 함께 설치함 — backend 쪽에 pytest 추가 요청 필요
        run: pip install -r requirements.txt pytest

      - name: Run Tests
        run: pytest tests
